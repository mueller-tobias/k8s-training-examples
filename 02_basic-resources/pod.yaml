apiVersion: v1
kind: Pod
metadata:
  name: dedicated-pod2
spec:
  containers:
    - name: myapp-container
      image: busybox
      command: ['sh', '-c', 'echo Hello Kubernetes! && sleep 3600']
      resources:
        requests:
          memory: "64Mi"
          cpu: "20"
