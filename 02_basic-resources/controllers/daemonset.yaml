apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd-elasticsearch
  namespace: default
  labels:
    k8s-app: fluentd-logging
spec:
  selector:
    matchLabels:
      name: fluentd-elasticsearch
  template:
    metadata:
      labels:
        name: fluentd-elasticsearch
    spec:
      # tolerations example, in this case, the pod can be scheduled on a node
      # with "node-role.kubernetes.io/master:NoSchedule" taint set
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: fluentd-elasticsearch
          image: docker.io/bitnami/fluentd:1.15.3-debian-11-r11
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      # how long should kubernetes after a delete request wait, before a "hard" termination
      # of the pod (SIGKILL) are executed (default 30 seconds)
      # @see https://cloud.google.com/blog/products/gcp/kubernetes-best-practices-terminating-with-grace
      terminationGracePeriodSeconds: 30
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
