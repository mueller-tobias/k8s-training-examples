apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: team-a-egress
  namespace: team-a
spec:
  podSelector:
    matchLabels:
      app: ta
  policyTypes:
  - Egress
  - Ingress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: team-b
      podSelector:
        matchLabels:
          app: tb
    ports:
    - protocol: TCP
      port: 80
      # endPort: 3000
  - to:
    - ipBlock:
        cidr: 10.42.0.0/16
    ports:
    - protocol: UDP
      port: 53
  - to:
    - ipBlock:
        cidr: 10.8.5.25/32
    ports:
    - protocol: TCP
      port: 443
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: team-b
      podSelector:
        matchLabels:
          app: tb
    ports:
    - protocol: TCP
      port: 80
