apiVersion: v1
kind: Pod
metadata:
  name: exceed-memory
  namespace: mem-example
spec:
  containers:
    - name: memory-demo-2-ctr
      image: polinux/stress
      resources:
        requests:
          memory: 5Gi
        limits:
          memory: 16Gi
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]
