# Symptom: OOMKilled
# Cause: container allocates more memory than limit, kernel OOM-killer terminates it.
# Inspect:
#   kubectl -n example-debugging describe pod oomkilled
#   Look for: State.Terminated.Reason = OOMKilled, exit code 137
apiVersion: v1
kind: Pod
metadata:
  name: oomkilled
  namespace: example-debugging
  labels:
    case: oomkilled
spec:
  restartPolicy: Always
  containers:
    - name: hog
      image: polinux/stress
      command: ["stress"]
      # allocate 250M, limit is 64M -> kernel kills
      args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "0"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "200m"
