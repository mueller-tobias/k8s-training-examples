# Demo: Pod Running but never Ready. Service has no endpoints. Degraded in ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: debug-readiness-fails
  namespace: infra-argocd
spec:
  project: training
  source:
    repoURL: https://github.com/mueller-tobias/k8s-training-examples.git
    targetRevision: main
    path: 12_debugging/examples
    directory:
      recurse: false
      include: '05-readiness-fails.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: example-debugging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
