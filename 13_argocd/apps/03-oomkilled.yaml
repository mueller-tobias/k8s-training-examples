# Demo: Pod terminated with reason OOMKilled. Visible in resource details.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: debug-oomkilled
  namespace: argocd
spec:
  project: training
  source:
    repoURL: https://github.com/mueller-tobias/k8s-training-examples.git
    targetRevision: main
    path: 12_debugging/examples
    directory:
      recurse: false
      include: '03-oomkilled.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: example-debugging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
